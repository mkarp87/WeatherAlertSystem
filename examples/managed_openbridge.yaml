# Path A, simplified: the app manages local helpers and sends outbound OpenBridge.
# No Asterisk. No local HBLink bridge.py. Remote OpenBridge listener remains external.

app:
  poll_interval_seconds: 60
  user_agent: "WeatherAlertSystem/1.0 CHANGE_ME@example.com"
  dry_run: false

nws:
  included_events: []
  excluded_events: ["Test Message"]
  max_alerts_per_group: 6

announcements:
  include_description: true
  include_instruction: true
  max_text_chars: 4000

openbridge:
  target_ip: "CHANGE_ME_OPENBRIDGE_HOST"
  target_port: 54097
  passphrase: "CHANGE_ME_OPENBRIDGE_SECRET"
  network_id: 31000182
  local_ip: "0.0.0.0"
  local_port: 0

station:
  callsign: "N0CALL"
  source_id: 1234567
  repeater_id: 31000182
  slot: 1
  color_code: 1

internal_ports:
  start: 43000
  step: 10

helpers:
  analog_bridge: auto
  mmdvm_bridge: auto
  md380_emu: auto
  md380_emu_args: "-S {md380emu_port}"
  md380_emu_wrapper: auto  # auto uses /opt/md380-emu/qemu-arm-static when present
  md380_emu_workdir: auto  # auto uses the md380-emu directory

groups:
  - name: ARC125
    enabled: true
    county_codes: [ARC125]
    talkgroup: 28515

  - name: ARC119
    enabled: false
    county_codes: [ARC119]
    talkgroup: 119

  - name: ARC200_ARC201
    enabled: false
    county_codes: [ARC200, ARC201]
    talkgroup: 201

# Higher-quality TTS. This is the SkyDescribe-compatible VoiceRSS path.
# Store the API key locally; do not commit it to a public repo.
SkyDescribe:
  APIKey: "CHANGE_ME_VOICERSS_API_KEY"
  Language: en-us
  Speed: 0
  Voice: John
  MaxWords: 300

tts:
  # Use voice_rss for SkyDescribe/VoiceRSS audio, or espeak for offline local TTS.
  backend: voice_rss
  voice: "en-us"
  speed_wpm: 145
